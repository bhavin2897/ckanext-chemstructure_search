<button
  type="button"
  class="structure-search-small-button"
  data-toggle="modal"
  data-target="#chemstructure-home-modal">
  <i class="fa fa-atom"></i>
  <span>Structure search</span>
</button>


</div>

<div
  class="modal fade chemstructure-modal"
  id="chemstructure-home-modal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="chemstructure-home-modal-title">

  <div class="modal-dialog chemstructure-modal-dialog" role="document">
    <div class="modal-content">

      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>

        <h4 class="modal-title" id="chemstructure-home-modal-title">
          Structure search
        </h4>
      </div>

      <div class="modal-body">

        <p class="text-muted">
          Draw a molecule or paste a SMILES/SMARTS query. The query is sent to the RDKit backend for structure matching.
        </p>

        <iframe
          id="ketcher-frame"
          src="/chemstructure_search/ketcher/index.html"
          class="chemstructure-modal-ketcher-frame">
        </iframe>

        <div class="form-group chemstructure-modal-query">
          <label for="chemstructure-smiles">SMILES / SMARTS query</label>
          <input
            id="chemstructure-smiles"
            class="form-control"
            type="text"
            placeholder="Draw a structure or paste a SMILES/SMARTS query">
              </div>

        <div class="chemstructure-search-mode">
        <label class="chemstructure-search-mode-title">
          Search type
        </label>

        <label class="chemstructure-radio-option">
          <input
            type="radio"
            name="chemstructure-search-mode"
            value="exact">
          <span>Exact match</span>
        </label>

        <label class="chemstructure-radio-option">
          <input
            type="radio"
            name="chemstructure-search-mode"
            value="similarity"
            checked>
          <span>Fingerprint similarity</span>
        </label>

        <label class="chemstructure-radio-option">
          <input
            type="radio"
            name="chemstructure-search-mode"
            value="substructure">
          <span>Substructure</span>
        </label>
      </div>

      <div id="chemstructure-threshold-wrapper" class="chemstructure-threshold-wrapper">
    <label for="chemstructure-threshold" class="chemstructure-threshold-label">
        Similarity threshold:
        <strong id="chemstructure-threshold-value">0.25</strong>
      </label>

      <input
        id="chemstructure-threshold"
        class="chemstructure-threshold-slider"
        type="range"
        min="0.05"
        max="1.00"
        step="0.05"
        value="0.25">
    </div>
        <div class="chemstructure-threshold-help">
        Lower values return broader results. Higher values return stricter matches.
    </div>

      <div class="chemstructure-actions">
      <button id="chemstructure-search" class="btn btn-primary">
        Search
      </button>

      <button id="chemstructure-clear" class="btn btn-link">
        Clear
      </button>
      </div>

        <div id="chemstructure-message" class="chemstructure-message"></div>

      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-default" data-dismiss="modal">
          Close
        </button>
      </div>

    </div>
  </div>
</div>

<style>
  .search-options-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 18px;
  }

  .advanced-toggles {
    display: flex;
    align-items: center;
  }

  .structure-search-inline {
    margin-left: auto;
    display: flex;
    align-items: center;
  }

  .structure-search-small-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 5px 10px;
    color: #fff;
    background: #1f9aaa;
    border: 1px solid #1f9aaa;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.2;
    box-shadow: none;
    cursor: pointer;
  }

  .structure-search-small-button:hover,
  .structure-search-small-button:focus {
    color: #fff;
    background: #168998;
    border-color: #168998;
  }

  .structure-search-small-button .fa {
    font-size: 13px;
  }

  .chemstructure-modal-dialog {
    width: 90%;
    max-width: 1200px;
  }

  .chemstructure-modal-ketcher-frame {
    width: 100%;
    height: 430px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
  }

  .chemstructure-modal-query {
    margin-top: 16px;
  }

  .chemstructure-search-mode {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 14px;
    margin-top: 14px;
    margin-bottom: 8px;
  }

  .chemstructure-search-mode-title {
    margin: 0;
    font-weight: 700;
    color: #333;
  }

  .chemstructure-search-mode label::after,
  .chemstructure-radio-option::after,
  .chemstructure-search-mode-title::after,
  .chemstructure-threshold-label::after,
  .chemstructure-threshold-wrapper label::after {
    content: none !important;
  }

  .chemstructure-radio-option {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin: 0;
    font-weight: 400;
    cursor: pointer;
  }

  .chemstructure-radio-option input {
    margin: 0;
  }

  #chemstructure-threshold-wrapper {
  display: none;
  align-items: center;
  gap: 10px;
  margin-top: 10px;
  margin-bottom: 12px;
  width: auto;
}

  #chemstructure-threshold-wrapper .chemstructure-threshold-label {
  margin: 0;
  font-weight: 600;
  white-space: nowrap;
}

  #chemstructure-threshold-wrapper #chemstructure-threshold {
  width: 25% !important;
  max-width: 180px !important;
  min-width: 120px !important;
  flex: 0 0 auto;
}

  #chemstructure-threshold-wrapper .chemstructure-threshold-help {
  margin: 0;
  color: #777;
  font-size: 12px;
}

  .chemstructure-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 12px;
    margin-bottom: 12px;
  }

  .chemstructure-actions .btn {
    min-width: 100px;
  }

  .chemstructure-message {
    margin-top: 12px;
  }

  @media (max-width: 768px) {
    .search-options-row {
      flex-direction: column;
      align-items: flex-start;
    }

    .structure-search-inline {
      margin-left: 0;
    }

    .chemstructure-search-mode {
      align-items: flex-start;
    }

    .chemstructure-threshold-wrapper {
      max-width: 100%;
    }

    .chemstructure-threshold-slider {
      width: 100%;
    }
  }
</style>
<script src="/chemstructure_search/structure_search.js"></script>
